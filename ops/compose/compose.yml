services:
  app:
    image: ghcr.io/example/wroughtworks:latest
    restart: unless-stopped
    env_file:
      - ../env/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${OPS_DATABASE_URL:-postgresql+asyncpg://wroughtworks:change-me@postgres:5432/wroughtworks}
      REDIS_URL: ${OPS_REDIS_URL:-redis://redis:6379/0}
    # Set a unique APP_PORT per repo (see _system/ports/PORT_POLICY.md) when many stacks run on one host.
    ports:
      - "127.0.0.1:${APP_PORT:-8080}:${APP_PORT:-8080}"

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: wroughtworks
      POSTGRES_USER: wroughtworks
      POSTGRES_PASSWORD: ${OPS_POSTGRES_PASSWORD:-change-me}
    expose:
      - "5432"
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - wroughtworks-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wroughtworks"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --save
      - "60"
      - "1"
      - --appendonly
      - "yes"
      - --loglevel
      - warning
    expose:
      - "6379"
    volumes:
      - wroughtworks-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  wroughtworks-postgres-data:
  wroughtworks-redis-data:
