# Meta-managed Codex CLI policy. Always-refresh — never edit downstream.
# Source of truth: TEMPLATE/.codex/config.aiaast.toml.
# See _system/HOST_SETTINGS_BASELINE.md.

["$aiaast"]
managed_by = "_AI_AGENT_SYSTEM_TEMPLATE"
policy_doc = "_system/HOST_SETTINGS_BASELINE.md"
preserve_first_sibling = ".codex/config.toml"
always_refresh = true
schema_version = "1.0.0"

[approval]
# Default-deny destructive ops; allow read-side ops without approval.
default_mode = "auto-suggest"
require_approval_for = [
  "shell.write",
  "shell.exec.network",
  "fs.delete",
  "git.push",
  "git.reset",
]

[aiaast_instructions]
# Codex reads these files as project context per AGENTS.md handoff contract.
context_files = [
  "AGENTS.md",
  "CODEX.md",
  "_system/INSTRUCTION_PRECEDENCE_CONTRACT.md",
  "_system/REPO_OPERATING_PROFILE.md",
  "_system/MASTER_SYSTEM_PROMPT.md",
  "_system/PROJECT_RULES.md",
  "_system/EXECUTION_PROTOCOL.md",
  "_system/MULTI_AGENT_COORDINATION.md",
  "_system/HALLUCINATION_DEFENSE_PROTOCOL.md",
  "_system/SYSTEM_AWARENESS_PROTOCOL.md",
  "_system/TOOL_MEMORY_ISOLATION_STAMP.md",
]

[mcp]
servers_pointer = "_system/MCP_CONFIG.md"
servers_example_toml = "_system/mcp/servers.codex.example.toml"

[tool_memory]
stamp_helper = "bootstrap/stamp-tool-memory.sh"
stamp_contract = "_system/TOOL_MEMORY_ISOLATION_STAMP.md"
memory_file = "_system/tool-memory/codex-memory.md"

[integrity]
verify_before_handoff = true
verify_command = "bash bootstrap/verify-integrity.sh --check --target ."
verify_meta_sync_before_handoff = true
meta_sync_gate_command = "bash bootstrap/check-pending-meta-sync.sh ."
meta_sync_reconcile_command = "bash bootstrap/reconcile-meta-sync.sh ."

[env_hint]
AIAST_HOST_ADAPTER = "codex-cli"
