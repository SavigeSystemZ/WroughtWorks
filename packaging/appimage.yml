version: 1

script:
  - mkdir -p AppDir/usr/bin
  - mkdir -p AppDir/usr/share/applications
  - mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
  - install -Dm755 ./dist/wroughtworks AppDir/usr/bin/wroughtworks
  - install -Dm644 ./packaging/io.aiaast.wroughtworks.desktop AppDir/usr/share/applications/io.aiaast.wroughtworks.desktop

AppDir:
  path: ./AppDir
  app_info:
    id: io.aiaast.wroughtworks
    name: WroughtWorks
    icon: io.aiaast.wroughtworks
    version: 0.1.0
    exec: usr/bin/wroughtworks
    exec_args: "$@"

  runtime:
    env:
      APP_BIND_ADDRESS: 127.0.0.1
      APP_CONFIG_DIR: /etc/wroughtworks
      APP_DATA_DIR: /var/lib/wroughtworks

  test:
    fedora-latest:
      command: ./AppRun --version

AppImage:
  arch: x86_64
  update-information: guess
